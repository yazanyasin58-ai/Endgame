<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Jarvis</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: rgba(0, 0, 0, 0.92);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 500px;
      text-align: center;
      padding: 48px 32px;
    }
    .label {
      font-size: 10px;
      letter-spacing: 4px;
      color: #555;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .message {
      font-size: 22px;
      font-weight: 600;
      line-height: 1.5;
      color: #f5f5f5;
      margin-bottom: 12px;
    }
    .timer {
      font-size: 13px;
      color: #666;
      margin-bottom: 36px;
    }
    .timer span { color: #aaa; font-weight: 600; }
    .actions { display: flex; gap: 12px; justify-content: center; }
    button {
      padding: 12px 28px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    .btn-standdown {
      background: #ef4444;
      color: #fff;
    }
    .btn-override {
      background: transparent;
      border: 1px solid #333 !important;
      color: #666;
      font-weight: 400;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="label">JARVIS</div>
    <div class="message" id="reason">Rule violation detected.</div>
    <div class="timer">Auto-dismissing in <span id="countdown">30</span>s</div>
    <div class="actions">
      <button class="btn-standdown" id="standdown">Stand down</button>
      <button class="btn-override" id="override">This was intentional</button>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const reason = params.get("reason") || "Rule violation detected.";
    const duration = parseInt(params.get("duration") || "30", 10);

    document.getElementById("reason").textContent = reason;

    let remaining = duration;
    const countdown = document.getElementById("countdown");
    countdown.textContent = remaining;

    const timer = setInterval(() => {
      remaining--;
      countdown.textContent = remaining;
      if (remaining <= 0) {
        clearInterval(timer);
        window.close();
      }
    }, 1000);

    document.getElementById("standdown").addEventListener("click", () => window.close());
    document.getElementById("override").addEventListener("click", () => {
      chrome.runtime.sendMessage({ type: "OVERRIDE_LOGGED" });
      window.close();
    });
  </script>
</body>
</html>
